# /etc/nginx/conf.d/tg-filehost.conf
# Generated by install.sh — do not edit manually

server {
    listen 80;
    server_name __HOST__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name __HOST__;

    ssl_certificate     __SSL_FULLCHAIN__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Generous client_max_body_size — uploads happen via Telegram, not HTTP,
    # but we still want large downloads to stream without buffering caps.
    client_max_body_size 0;

    # Static file serving — direct from disk, no proxy.
    location /files/ {
        alias __UPLOAD_DIR__/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Prevent the meta file and tmp partials from leaking
        location ~ /\. { deny all; }
    }

    # Health proxy — Node.js runs on 127.0.0.1:__PORT__
    location /health {
        proxy_pass         http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Anything else is rejected
    location / {
        return 404;
    }
}
